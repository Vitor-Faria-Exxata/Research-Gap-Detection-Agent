pipeline:
  num_queries: 5
  top_papers: 20
  papers_per_query_per_source: 25
  request_timeout_s: 60
  max_workers: 8
  llm_max_concurrency: 2
  use_graph_analyzer: false

document_converter:
  provider_name: pymupdf
  use_arxiv_html: true

reranker:
  provider_name: jina
  fallback: langsearch

sources:
  arxiv_enabled: true
  openalex_enabled: false
  semantic_scholar_enabled: false

llm:
  default:
    provider: nvidia
    model: deepseek-ai/deepseek-v4-pro
    temperature: 0.3
    base_url: https://integrate.api.nvidia.com/v1

  query_rewriter:
    provider: nvidia
    model: meta/llama-3.1-8b-instruct
    temperature: 0.7
    base_url: https://integrate.api.nvidia.com/v1

  insight_extractor:
    provider: nvidia
    model: meta/llama-3.1-8b-instruct
    temperature: 0.2
    base_url: https://integrate.api.nvidia.com/v1

  gap_identifier:
    provider: nvidia
    model: deepseek-ai/deepseek-v4-pro
    temperature: 0.3
    base_url: https://integrate.api.nvidia.com/v1

  aggregator:
    provider: nvidia
    model: deepseek-ai/deepseek-v4-pro
    temperature: 0.3
    base_url: https://integrate.api.nvidia.com/v1
